<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor de Comprensión Lectora Adaptativo</title>
    <!-- Scripts necesarios para ejecutar React y Tailwind en un solo archivo -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .lucide-icon-container i {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    i.setAttribute('data-lucide', lucideName);
                    i.setAttribute('width', size);
                    i.setAttribute('height', size);
                    i.className = className;
                    containerRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="lucide-icon-container inline-flex"></span>;
        };

        const App = () => {
            const [step, setStep] = useState('input');
            const [originalText, setOriginalText] = useState('');
            const [adaptedText, setAdaptedText] = useState('');
            const [isInternational, setIsInternational] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisProgress, setAnalysisProgress] = useState('');
            const [showReadingModal, setShowReadingModal] = useState(false);
            const [error, setError] = useState(null);
            
            const fileInputRef = useRef(null);
            
            // --- INSERTA TU API KEY DE GOOGLE AQUÍ ---
            const apiKey = "AIzaSyDgPmh39Zy-FWsJEk-gYk92qyyb7PHWWp8"; 

            useEffect(() => {
                if (window.pdfjsLib) {
                    window.pdfjsLib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${window.pdfjsLib.version}/pdf.worker.min.js`;
                }
            }, []);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsAnalyzing(true);
                setAnalysisProgress('Leyendo archivo...');
                setError(null);
                try {
                    if (file.type === 'application/pdf') {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        let fullText = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            fullText += content.items.map(item => item.str).join(' ') + '\n';
                        }
                        setOriginalText(fullText);
                    } else {
                        const content = await file.text();
                        setOriginalText(content);
                    }
                } catch (err) {
                    setError("Error al leer el archivo. Prueba con copiar y pegar el texto.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const generateQuestions = async () => {
                if (!originalText.trim()) return;
                if (!apiKey) {
                    setError("Por favor, introduce tu API Key en el código fuente.");
                    return;
                }

                setIsAnalyzing(true);
                setAnalysisProgress('Generando retos de comprensión...');
                setError(null);

                const needsAdaptation = originalText.toLowerCase().includes('internacional');
                setIsInternational(needsAdaptation);

                const systemPrompt = `Eres un tutor experto de primaria. Tu tarea es generar exactamente 10 preguntas de opción múltiple basadas en el texto:
                - 4 preguntas de nivel LITERAL.
                - 3 preguntas de nivel INFERENCIAL.
                - 3 preguntas de nivel CRÍTICO.
                ${needsAdaptation ? 'Adaptación: Simplifica el lenguaje para nivel extranjero A1.' : ''}
                Responde ÚNICAMENTE con un JSON:
                {
                  "adaptedText": "el texto original o simplificado",
                  "questions": [
                    {
                      "id": "q1",
                      "question": "texto de la pregunta",
                      "options": ["Opción A", "Opción B", "Opción C", "Opción D"],
                      "correct_answer": "Opción exacta correcta",
                      "level": "literal|inferencial|crítico"
                    }
                  ]
                }`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Texto original: ${originalText}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { 
                                responseMimeType: "application/json", 
                                temperature: 0.7 
                            }
                        })
                    });

                    if (!response.ok) {
                        const data = await response.json();
                        throw new Error(data.error?.message || "Error en la comunicación con la IA.");
                    }

                    const data = await response.json();
                    const rawResponse = data.candidates[0].content.parts[0].text;
                    const res = JSON.parse(rawResponse);
                    
                    setAdaptedText(res.adaptedText || originalText);
                    setQuestions(res.questions || []);
                    setStep('quiz');
                } catch (e) { 
                    setError("Error del sistema: " + e.message);
                } finally { 
                    setIsAnalyzing(false); 
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 bg-slate-50">
                    <div className="max-w-4xl mx-auto">
                        <header className="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 p-3 rounded-xl text-white shadow-lg">
                                    <Icon name="BookOpen" />
                                </div>
                                <h1 className="text-xl font-bold text-slate-900">Tutor de Comprensión</h1>
                            </div>
                            {isInternational && (
                                <div className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-indigo-200">
                                    Modo Internacional
                                </div>
                            )}
                        </header>

                        {error && (
                            <div className="mb-6 bg-rose-50 border border-rose-100 text-rose-700 p-5 rounded-2xl text-sm flex items-start gap-3 animate-in">
                                <Icon name="AlertCircle" />
                                <p className="font-medium">{error}</p>
                            </div>
                        )}

                        {step === 'input' && (
                            <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-6 animate-in">
                                <div onClick={() => fileInputRef.current?.click()} className="border-2 border-dashed border-slate-200 p-10 rounded-2xl text-center cursor-pointer hover:bg-blue-50 transition-all group">
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                    <Icon name="Upload" size={40} className="text-blue-600 mb-2 mx-auto group-hover:scale-110 transition-transform" />
                                    <p className="font-bold text-slate-700">Subir Lectura (PDF o TXT)</p>
                                    <p className="text-sm text-slate-400">O arrastra el archivo aquí</p>
                                </div>
                                <textarea 
                                    className="w-full h-44 p-5 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 transition-all resize-none text-slate-700" 
                                    placeholder="Pega el texto aquí..." 
                                    value={originalText} 
                                    onChange={(e) => setOriginalText(e.target.value)} 
                                />
                                <button 
                                    onClick={generateQuestions} 
                                    disabled={!originalText.trim() || isAnalyzing} 
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 transition-all active:scale-[0.98]"
                                >
                                    {isAnalyzing ? "Analizando contenido..." : "Comenzar Tutoría"}
                                </button>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="space-y-6 animate-in pb-28">
                                {questions.map((q, i) => (
                                    <div key={i} className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-5">
                                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-300">Reto {i+1} de 10</span>
                                            <span className={`text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest ${q.level === 'crítico' ? 'bg-purple-50 text-purple-600' : q.level === 'inferencial' ? 'bg-amber-50 text-amber-600' : 'bg-blue-50 text-blue-600'}`}>{q.level}</span>
                                        </div>
                                        <p className="font-bold text-slate-800 mb-6 leading-snug text-xl">{q.question}</p>
                                        <div className="grid gap-3">
                                            {q.options?.map(opt => (
                                                <button 
                                                    key={opt} 
                                                    onClick={() => setAnswers({...answers, [i]: opt})} 
                                                    className={`w-full text-left p-5 rounded-2xl border-2 transition-all duration-200 ${answers[i] === opt ? 'border-blue-600 bg-blue-50 text-blue-800 font-bold shadow-md' : 'border-slate-50 bg-slate-50 text-slate-600 hover:border-slate-200'}`}
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {step === 'quiz' && (
                            <button onClick={() => setShowReadingModal(true)} className="fixed bottom-10 right-10 bg-white border-2 border-blue-600 text-blue-600 p-5 rounded-full shadow-2xl hover:scale-110 active:scale-90 transition-all z-40">
                                <Icon name="Eye" size={32} />
                            </button>
                        )}

                        {showReadingModal && (
                            <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-[100] animate-in">
                                <div className="bg-white rounded-[3rem] max-w-2xl w-full max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border border-white/20">
                                    <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-blue-50/50">
                                        <div className="flex items-center gap-3"><Icon name="BookOpen" size={24} className="text-blue-600" /><h2 className="font-black text-slate-900 uppercase text-sm tracking-widest">Lectura Original</h2></div>
                                        <button onClick={() => setShowReadingModal(false)} className="p-3 rounded-full text-slate-400 hover:text-rose-500 transition-all"><Icon name="X" size={24} /></button>
                                    </div>
                                    <div className="p-12 overflow-y-auto text-xl leading-relaxed text-slate-700 whitespace-pre-wrap font-medium">{adaptedText || originalText}</div>
                                </div>
                            </div>
                        )}

                        {isAnalyzing && (
                            <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-xl flex items-center justify-center z-[200]">
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl text-center space-y-6 animate-in max-w-xs w-full">
                                    <div className="animate-spin inline-block text-blue-600"><Icon name="RefreshCw" size={56} /></div>
                                    <p className="font-black text-slate-900 uppercase tracking-widest text-xs leading-relaxed">{analysisProgress}</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
