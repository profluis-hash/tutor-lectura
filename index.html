<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor de Comprensión Lectora Adaptativo</title>
    <!-- Cargamos las librerías necesarias con versiones específicas para mayor estabilidad -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .lucide-icon-container i { display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    i.setAttribute('data-lucide', lucideName);
                    i.setAttribute('width', size);
                    i.setAttribute('height', size);
                    i.className = className;
                    containerRef.current.appendChild(i);
                    window.lucide.createIcons();
                }
            }, [name]);
            return <span ref={containerRef} className="lucide-icon-container inline-flex"></span>;
        };

        const App = () => {
            const [step, setStep] = useState('input');
            const [originalText, setOriginalText] = useState('');
            const [adaptedText, setAdaptedText] = useState('');
            const [isInternational, setIsInternational] = useState(false);
            const [questions, setQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [analysisProgress, setAnalysisProgress] = useState('');
            const [showReadingModal, setShowReadingModal] = useState(false);
            const [error, setError] = useState(null);
            
            const fileInputRef = useRef(null);
            
            // --- PEGA TU API KEY AQUÍ ABAJO ---
            const apiKey = "AIzaSyDgPmh39Zy-FWsJEk-gYk92qyyb7PHWWp8"; 

            const generateQuestions = async () => {
                if (!originalText.trim()) return;
                if (!apiKey || apiKey.length < 5) {
                    setError("⚠️ Falta la API Key o es inválida. Agrégala en el código fuente.");
                    return;
                }

                setIsAnalyzing(true);
                setAnalysisProgress('Conectando con el cerebro de la IA...');
                setError(null);

                const needsAdaptation = originalText.toLowerCase().includes('internacional');
                setIsInternational(needsAdaptation);

                const systemPrompt = `Eres un tutor de primaria experto. Genera exactamente 10 preguntas de opción múltiple (4 literales, 3 inferenciales, 3 críticas). 
                Responde ÚNICAMENTE en formato JSON:
                {
                  "adaptedText": "Texto adaptado si es modo internacional, sino el original",
                  "questions": [
                    {"id": "q1", "question": "...", "options": ["A", "B", "C", "D"], "correct_answer": "...", "level": "literal"}
                  ]
                }`;

                try {
                    // Usamos la URL v1beta que es la más compatible con Gemini Flash
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Analiza este texto y genera los retos: ${originalText}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.7
                            }
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "Error desconocido en la API.");
                    }

                    const data = await response.json();
                    const jsonText = data.candidates[0].content.parts[0].text;
                    const parsedData = JSON.parse(jsonText);
                    
                    setAdaptedText(parsedData.adaptedText || originalText);
                    setQuestions(parsedData.questions);
                    setStep('quiz');
                } catch (e) { 
                    console.error(e);
                    setError("Hubo un problema al generar las preguntas. Verifica tu API Key y tu conexión a internet. Detalle: " + e.message);
                } finally { 
                    setIsAnalyzing(false); 
                }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsAnalyzing(true);
                setAnalysisProgress('Leyendo archivo...');
                try {
                    if (file.type === 'application/pdf') {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        let text = "";
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(item => item.str).join(' ') + "\n";
                        }
                        setOriginalText(text);
                    } else {
                        setOriginalText(await file.text());
                    }
                } catch (err) {
                    setError("No pudimos leer el archivo. Intenta copiar y pegar el texto directamente.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-10 bg-slate-50">
                    <div className="max-w-4xl mx-auto">
                        <header className="flex items-center justify-between mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-lg shadow-blue-200">
                                    <Icon name="BookOpen" size={28} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold">Tutor de Comprensión</h1>
                                    <p className="text-xs text-slate-400 font-medium tracking-tight">INTELIGENCIA ARTIFICIAL EDUCATIVA</p>
                                </div>
                            </div>
                        </header>

                        {error && (
                            <div className="mb-6 bg-rose-50 border border-rose-100 text-rose-700 p-6 rounded-3xl animate-in flex gap-4">
                                <Icon name="AlertTriangle" className="shrink-0" />
                                <div className="text-sm">{error}</div>
                            </div>
                        )}

                        {step === 'input' && (
                            <div className="bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm space-y-8 animate-in">
                                <div onClick={() => fileInputRef.current?.click()} className="border-4 border-dashed border-slate-100 p-12 rounded-3xl text-center cursor-pointer hover:bg-blue-50 transition-all group">
                                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                                    <Icon name="CloudUpload" size={48} className="text-blue-600 mb-4 mx-auto group-hover:scale-110 transition-transform" />
                                    <p className="font-bold text-lg">Carga tu Lectura</p>
                                    <p className="text-slate-400 text-sm">PDF o archivos de texto</p>
                                </div>
                                
                                <div className="space-y-2">
                                    <label className="text-xs font-black uppercase text-slate-400 ml-2">O pega el contenido aquí</label>
                                    <textarea 
                                        className="w-full h-48 p-6 bg-slate-50 border-none rounded-3xl outline-none focus:ring-4 focus:ring-blue-100 transition-all text-slate-700" 
                                        value={originalText} 
                                        onChange={(e) => setOriginalText(e.target.value)} 
                                        placeholder="Escribe o pega el texto que quieres que analice..."
                                    />
                                </div>

                                <button 
                                    onClick={generateQuestions} 
                                    disabled={!originalText.trim() || isAnalyzing} 
                                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white py-6 rounded-3xl font-black text-xl shadow-2xl shadow-blue-200 transition-all active:scale-95"
                                >
                                    {isAnalyzing ? "Generando 10 retos..." : "Comenzar Tutoría"}
                                </button>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="space-y-6 pb-32 animate-in">
                                {questions.map((q, i) => (
                                    <div key={i} className="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="bg-slate-100 text-slate-500 text-[10px] font-black px-4 py-2 rounded-full uppercase tracking-tighter">Reto {i+1} de 10</span>
                                            <span className="text-[10px] font-black uppercase text-blue-600">{q.level}</span>
                                        </div>
                                        <h3 className="text-2xl font-bold mb-8 leading-tight">{q.question}</h3>
                                        <div className="grid gap-3">
                                            {q.options.map(opt => (
                                                <button 
                                                    key={opt} 
                                                    onClick={() => setAnswers({...answers, [i]: opt})}
                                                    className={`w-full text-left p-6 rounded-2xl border-2 transition-all ${answers[i] === opt ? 'border-blue-600 bg-blue-50 font-bold scale-[1.02]' : 'border-slate-50 bg-slate-50 hover:border-slate-200'}`}
                                                >
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {step === 'quiz' && (
                            <button onClick={() => setShowReadingModal(true)} className="fixed bottom-10 right-10 bg-white border-2 border-blue-600 text-blue-600 p-6 rounded-full shadow-2xl z-50 hover:scale-110 active:scale-90 transition-all">
                                <Icon name="BookOpenText" size={32} />
                            </button>
                        )}

                        {showReadingModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center p-6 z-[100] animate-in">
                                <div className="bg-white rounded-[3rem] max-w-2xl w-full max-h-[80vh] flex flex-col shadow-2xl overflow-hidden">
                                    <div className="p-8 border-b flex justify-between items-center bg-blue-50/50">
                                        <h2 className="font-black uppercase text-xs tracking-widest">Texto de Consulta</h2>
                                        <button onClick={() => setShowReadingModal(false)} className="p-2 hover:bg-rose-100 hover:text-rose-600 rounded-full transition-colors"><Icon name="X" /></button>
                                    </div>
                                    <div className="p-12 overflow-y-auto text-xl leading-relaxed text-slate-700 whitespace-pre-wrap">{adaptedText}</div>
                                </div>
                            </div>
                        )}

                        {isAnalyzing && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl flex items-center justify-center z-[200]">
                                <div className="bg-white p-12 rounded-[3rem] shadow-2xl text-center space-y-6">
                                    <div className="inline-block animate-spin text-blue-600"><Icon name="Loader2" size={60} /></div>
                                    <p className="font-black text-slate-900 uppercase tracking-widest text-xs">{analysisProgress}</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
